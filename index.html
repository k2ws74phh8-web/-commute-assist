<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通勤アシスト</title>

<style>
body{
    margin:0;
    background:#f3f8ff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.card{
    background:white;
    margin:15px;
    padding:16px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.title{
    color:#0d6efd;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.value{
    font-size:24px;
    font-weight:bold;
}

.small{
    color:#666;
    margin-top:5px;
}

button{
    width:90%;
    display:block;
    margin:25px auto;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0d6efd;
    color:white;
    font-size:20px;
}

footer{
    text-align:center;
    color:#777;
    margin:25px;
}
</style>
</head>

<body>

<header>
🚉 通勤アシスト
</header>

<div class="card">
<div class="title">📅 今日</div>
<div class="value" id="today"></div>
</div>

<div class="card">
<div class="title">📍 通勤ルート</div>
<div class="value">
下総中山 → 高輪ゲートウェイ
</div>
</div>

<div class="card">
<div class="title">🕗 出発予定</div>
<div class="value">8:18</div>
<div class="small">9時前後到着予定</div>
</div>

<div class="card">
<div class="title">🚆 おすすめルート</div>
<div class="value">市川乗換（快速）</div>
</div>

<div class="card">
<div class="title">🕘 到着予定</div>
<div class="value">8:56</div>
</div>

<button onclick="location.reload()">
🔄 更新
</button>

<footer>
Commute Assist Ver.1.1
</footer>

<script>
const days=["日","月","火","水","木","金","土"];
const now=new Date();

document.getElementById("today").innerHTML=
`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
</script>

</body>
</html>
